<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>☕ Cozy Brews Archive Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        /* Lofi Coffee Theme Definitions */
        :root {
            /* Light Theme: Roasted Espresso / Oatmeal Cream */
            --bg-base: #f4edd8;
            --bg-surface: #eae0c8;
            --bg-sidebar: #dfd5b8;
            --text-main: #4a3e3d;
            --text-muted: #7d6b68;
            --accent: #d27974;
            --accent-hover: #b95d59;
            --border-color: #d3c7a8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme: Midnight Brew / Cozy Café Dusk */
                --bg-base: #1e1d2f;
                --bg-surface: #252438;
                --bg-sidebar: #191826;
                --text-main: #e0def4;
                --text-muted: #908caa;
                --accent: #ebbcba;
                --accent-hover: #e0afad;
                --border-color: #312f44;
            }
        }

        /* Manual class overrides for theme toggling */
        html.theme-light {
            --bg-base: #f4edd8;
            --bg-surface: #eae0c8;
            --bg-sidebar: #dfd5b8;
            --text-main: #4a3e3d;
            --text-muted: #7d6b68;
            --accent: #d27974;
            --accent-hover: #b95d59;
            --border-color: #d3c7a8;
        }

        html.theme-dark {
            --bg-base: #1e1d2f;
            --bg-surface: #252438;
            --bg-sidebar: #191826;
            --text-main: #e0def4;
            --text-muted: #908caa;
            --accent: #ebbcba;
            --accent-hover: #e0afad;
            --border-color: #312f44;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            /* Fixes native touch latency delays in iOS Safari */
            touch-action: manipulation;
        }

        .bg-surface { background-color: var(--bg-surface); }
        .bg-sidebar { background-color: var(--bg-sidebar); }
        .text-muted { color: var(--text-muted); }
        .accent-color { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .bg-accent:hover { background-color: var(--accent-hover); }
        .border-theme { border-color: var(--border-color); }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /*
         * Sidebar slide state, defined as real CSS rather than toggled Tailwind
         * utility classes (previously -translate-x-full / translate-x-0).
         * The Tailwind CDN build generates styles by watching the DOM and adding
         * rules for class names as it sees them. Utility classes already present
         * in the markup at load time are fine, but a class added for the first
         * time purely at runtime (which is what a JS-driven toggle does) can
         * race that generation step - most visible on iOS Safari, where the
         * first tap can appear to do nothing. Defining the two states directly
         * here means the rule exists from first paint, no race possible.
         */
        #cafe-menu-sidebar {
            transform: translateX(-100%);
        }
        #cafe-menu-sidebar.sidebar-open {
            transform: translateX(0);
        }
        @media (min-width: 768px) {
            #cafe-menu-sidebar {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden select-none">

    <header class="h-14 px-4 flex items-center justify-between border-b border-theme bg-surface z-30">
        <div class="flex items-center space-x-3">
            <button id="barista-menu-toggle" class="p-2 rounded bg-sidebar border border-theme active:scale-95 transition-transform" title="Toggle Menu" aria-label="Toggle Menu" aria-expanded="false" aria-controls="cafe-menu-sidebar">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-md md:text-lg font-bold tracking-tight">Cozy Coffee House</h1>
        </div>

        <div class="flex items-center space-x-2">
            <button id="mug-style-toggle" class="p-2 rounded bg-sidebar border border-theme text-sm">
                ☕ Mug Style
            </button>
            <label class="px-3 py-1.5 rounded bg-accent text-xs md:text-sm font-semibold text-stone-900 cursor-pointer shadow-sm hover:opacity-90 active:scale-95 transition-transform">
                Pour New Zip
                <input type="file" id="coffee-zip-input" accept=".zip" class="hidden">
            </label>
        </div>
    </header>

    <div class="flex-1 flex relative overflow-hidden">

        <aside id="cafe-menu-sidebar" class="absolute inset-y-0 left-0 w-80 bg-sidebar border-r border-theme z-20 transition-transform duration-300 will-change-transform flex flex-col md:relative">
            <div class="p-3 border-b border-theme space-y-2">
                <input type="text" id="bean-search-input" placeholder="Search menu items..." class="w-full px-3 py-1.5 text-sm rounded bg-surface border border-theme focus:outline-none focus:ring-1 focus:ring-[var(--accent)]">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-muted">Roast Order:</span>
                    <select id="roast-sort-select" class="bg-surface border border-theme rounded px-1.5 py-0.5 focus:outline-none">
                        <option value="asc">Mild (A-Z)</option>
                        <option value="desc">Dark (Z-A)</option>
                    </select>
                </div>
            </div>

            <div id="brewed-items-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <div class="text-center py-8 text-sm text-muted">No beans ground yet. Pour a zip to begin brewing.</div>
            </div>
        </aside>

        <div id="cafe-apron-overlay" class="absolute inset-0 bg-black/50 z-10 hidden transition-opacity duration-300 cursor-pointer" aria-hidden="true"></div>

        <main class="flex-1 relative bg-[var(--bg-base)] transition-colors duration-300">
            <iframe id="coffee-mug-frame" class="absolute inset-0 w-full h-full border-none hidden"></iframe>
            <div id="empty-mug-state" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                <div class="text-5xl mb-4">☕</div>
                <h2 class="text-xl font-semibold mb-1">Your coffee mug is empty</h2>
                <p class="text-sm text-muted max-w-xs">Load a zip archive holding self-contained HTML files to fill up your layout view.</p>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const coffeeZipInput = document.getElementById('coffee-zip-input');
        const brewedItemsList = document.getElementById('brewed-items-list');
        const coffeeMugFrame = document.getElementById('coffee-mug-frame');
        const emptyMugState = document.getElementById('empty-mug-state');
        const cafeMenuSidebar = document.getElementById('cafe-menu-sidebar');
        const cafeApronOverlay = document.getElementById('cafe-apron-overlay');
        const baristaMenuToggle = document.getElementById('barista-menu-toggle');
        const beanSearchInput = document.getElementById('bean-search-input');
        const roastSortSelect = document.getElementById('roast-sort-select');
        const mugStyleToggle = document.getElementById('mug-style-toggle');

        // State Tracking Engine
        let groundBeansMap = {};
        let sortedBeanPaths = [];
        let activeBeanPath = null;
        let isSidebarOpen = false;

        // Small helper: delays invoking fn until `delay` ms have passed since the
        // last call. Used to keep scroll-position caching off the main thread's
        // critical path during an active scroll gesture.
        function debounce(fn, delay) {
            let timeoutId;
            return (...args) => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => fn(...args), delay);
            };
        }

        // Initialize Cafe Viewport Layout
        async function init() {
            // Screen Breakpoint Check for initial setup
            isSidebarOpen = window.innerWidth >= 768;
            cafeMenuSidebar.classList.toggle('sidebar-open', isSidebarOpen);
            baristaMenuToggle.setAttribute('aria-expanded', String(isSidebarOpen));

            // Restore Custom Lofi Mug Theme
            const savedStyle = localStorage.getItem('theme');
            if (savedStyle) {
                document.documentElement.className = `theme-${savedStyle}`;
            }

            // Load Saved Beans from IndexedDB
            try {
                const cachedBeans = await localforage.getItem('cached_zip');
                if (cachedBeans) {
                    await processCoffeeZip(cachedBeans);
                }
            } catch (err) {
                console.error("IndexedDB couldn't retrieve ground coffee archive:", err);
            }
        }

        // Apply theme color styling matches deep into the active iframe page instance
        function splashMugColor() {
            try {
                const frameDoc = coffeeMugFrame.contentDocument || coffeeMugFrame.contentWindow.document;
                if (!frameDoc || !frameDoc.body) return;

                const targetBg = getComputedStyle(document.body).getPropertyValue('--bg-base').trim();
                const targetText = getComputedStyle(document.body).getPropertyValue('--text-main').trim();

                let styleTag = frameDoc.getElementById('mug-theme-override');
                if (!styleTag) {
                    styleTag = frameDoc.createElement('style');
                    styleTag.id = 'mug-theme-override';
                    frameDoc.head.appendChild(styleTag);
                }

                styleTag.textContent = `
                    body, html, #page, .wrapper, main, div, p, span, section, article { 
                        background-color: ${targetBg} !important; 
                        color: ${targetText} !important; 
                    }
                `;
            } catch (e) {
                console.warn("Cross-origin or early load cycle stopped theme delivery.", e);
            }
        }

        // Toggle Mug Visual Styles
        mugStyleToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('theme-dark') ||
                           (!document.documentElement.classList.contains('theme-light') && window.matchMedia('(prefers-color-scheme: dark)').matches);

            const nextTheme = isDark ? 'light' : 'dark';
            document.documentElement.className = `theme-${nextTheme}`;
            localStorage.setItem('theme', nextTheme);

            splashMugColor();
        });

        // Sidebar Visibility Mechanics
        function toggleSidebarState() {
            isSidebarOpen = !isSidebarOpen;
            baristaMenuToggle.setAttribute('aria-expanded', String(isSidebarOpen));

            if (isSidebarOpen) {
                // Force a style recalculation before starting the transition -
                // helps Safari reliably animate the very first time this runs.
                void cafeMenuSidebar.offsetHeight;

                cafeMenuSidebar.classList.add('sidebar-open');
                if (window.innerWidth < 768) {
                    cafeApronOverlay.classList.remove('hidden');
                }
            } else {
                cafeMenuSidebar.classList.remove('sidebar-open');
                cafeApronOverlay.classList.add('hidden');
            }
        }

        // Explicit Click bindings
        baristaMenuToggle.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleSidebarState();
        });

        cafeApronOverlay.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleSidebarState();
        });

        // Load new file input zip package
        coffeeZipInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                await localforage.setItem('cached_zip', file);
            } catch (err) {
                console.warn("Local cache threshold hit. Skipping store optimization.", err);
            }

            await processCoffeeZip(file);
        });

        // Parse ZIP Contents
        async function processCoffeeZip(file) {
            try {
                const zip = await JSZip.loadAsync(file);
                groundBeansMap = {};
                sortedBeanPaths = [];

                zip.forEach((relativePath, zipEntry) => {
                    if (!zipEntry.dir && relativePath.toLowerCase().endsWith('.html')) {
                        groundBeansMap[relativePath] = zipEntry;
                        sortedBeanPaths.push(relativePath);
                    }
                });

                renderCafeMenu();

                const lastBrew = localStorage.getItem('last_active_path');
                if (lastBrew && groundBeansMap[lastBrew]) {
                    await pourMugSelection(lastBrew, true);
                } else if (sortedBeanPaths.length > 0) {
                    await pourMugSelection(sortedBeanPaths[0]);
                }

            } catch (err) {
                alert("Coffee package failed to pour: " + err.message);
                console.error(err);
            }
        }

        // Render Menu with Natural Alphanumeric Sorting
        function renderCafeMenu() {
            const query = beanSearchInput.value.toLowerCase();
            const sortOrder = roastSortSelect.value;

            let filtered = sortedBeanPaths.filter(path => {
                const filename = path.split('/').pop();
                return filename.toLowerCase().includes(query);
            });

            // NATURAL SORT: Manages matching numeric codes perfectly (e.g. 1, 2, 10)
            filtered.sort((a, b) => {
                const nameA = a.split('/').pop();
                const nameB = b.split('/').pop();

                return sortOrder === 'asc'
                    ? nameA.localeCompare(nameB, undefined, { numeric: true, sensitivity: 'base' })
                    : nameB.localeCompare(nameA, undefined, { numeric: true, sensitivity: 'base' });
            });

            if (filtered.length === 0) {
                brewedItemsList.innerHTML = `<div class="text-center py-8 text-sm text-muted">No café items match your blend search.</div>`;
                return;
            }

            brewedItemsList.innerHTML = '';
            filtered.forEach(path => {
                const filename = path.split('/').pop();
                const folderPath = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';

                const button = document.createElement('button');
                button.className = `w-full text-left p-3 rounded-lg border transition-all text-sm flex flex-col gap-1 ${
                    activeBeanPath === path
                        ? 'bg-accent text-stone-900 font-semibold border-transparent shadow-sm'
                        : 'bg-surface border-theme hover:opacity-90'
                }`;

                button.innerHTML = `
                    <span class="truncate w-full">${filename}</span>
                    ${folderPath ? `<span class="text-[10px] opacity-70 truncate w-full">${folderPath}</span>` : ''}
                `;

                button.addEventListener('click', (e) => {
                    pourMugSelection(path);
                    if (window.innerWidth < 768) {
                        toggleSidebarState();
                    }
                });

                brewedItemsList.appendChild(button);
            });
        }

        // Render inside canvas frame
        async function pourMugSelection(path, restoreScrollPosition = false) {
            activeBeanPath = path;
            localStorage.setItem('last_active_path', path);

            renderCafeMenu();

            const entry = groundBeansMap[path];
            if (!entry) return;

            let htmlContent = await entry.async('string');

            // PRE-PASS FIX FOR LAZY-LOADED EMBEDDED GRAPHICS
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const images = doc.querySelectorAll('img');

                images.forEach(img => {
                    let embeddedBase64 = null;

                    for (const attr of img.attributes) {
                        if (attr.value.startsWith('data:image/')) {
                            if (attr.name !== 'src' || !embeddedBase64) {
                                embeddedBase64 = attr.value;
                            }
                        }
                    }

                    if (embeddedBase64) {
                        img.setAttribute('src', embeddedBase64);
                        img.removeAttribute('loading');
                        img.classList.remove('lazyload', 'lazy');
                    }
                });

                htmlContent = doc.documentElement.outerHTML;
            } catch (e) {
                console.error("Graphics conversion cycle fault: ", e);
            }

            emptyMugState.classList.add('hidden');
            coffeeMugFrame.classList.remove('hidden');

            coffeeMugFrame.srcdoc = htmlContent;

            coffeeMugFrame.onload = () => {
                const frameWindow = coffeeMugFrame.contentWindow;

                // Align internal color theme values immediately
                splashMugColor();

                if (restoreScrollPosition) {
                    const savedScroll = localStorage.getItem(`scroll_${path}`);
                    if (savedScroll) {
                        const targetScroll = parseFloat(savedScroll);
                        let attempts = 0;
                        const scrollInterval = setInterval(() => {
                            frameWindow.scrollTo(0, targetScroll);
                            attempts++;
                            if (attempts > 10 || frameWindow.scrollY === targetScroll) {
                                clearInterval(scrollInterval);
                            }
                        }, 50);
                    }
                }

                frameWindow.removeEventListener('scroll', cacheScrollPosition);
                frameWindow.addEventListener('scroll', cacheScrollPosition);
            };
        }

        // Debounced so a scroll gesture doesn't fire a synchronous localStorage
        // write on every single scroll event (localStorage.setItem is blocking,
        // and that adds up fast during a fast flick, especially on iOS).
        const cacheScrollPosition = debounce(() => {
            if (activeBeanPath) {
                const frameWindow = coffeeMugFrame.contentWindow;
                if (frameWindow) {
                    localStorage.setItem(`scroll_${activeBeanPath}`, frameWindow.scrollY);
                }
            }
        }, 200);

        beanSearchInput.addEventListener('input', renderCafeMenu);
        roastSortSelect.addEventListener('change', renderCafeMenu);

        init();
    </script>
</body>
</html>
