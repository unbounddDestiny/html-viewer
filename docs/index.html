<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lofi HTML Archive Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <style>
        /* Lofi Theme Definitions */
        :root {
            /* Light Theme: Warm Sepia / Oatmeal Cream */
            --bg-base: #f4edd8;
            --bg-surface: #eae0c8;
            --bg-sidebar: #dfd5b8;
            --text-main: #4a3e3d;
            --text-muted: #7d6b68;
            --accent: #d27974;
            --accent-hover: #b95d59;
            --border-color: #d3c7a8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme: Midnight Lavender / Cozy Dusk */
                --bg-base: #1e1d2f;
                --bg-surface: #252438;
                --bg-sidebar: #191826;
                --text-main: #e0def4;
                --text-muted: #908caa;
                --accent: #ebbcba;
                --accent-hover: #e0afad;
                --border-color: #312f44;
            }
        }

        /* Manual class overrides for theme toggling */
        html.theme-light {
            --bg-base: #f4edd8;
            --bg-surface: #eae0c8;
            --bg-sidebar: #dfd5b8;
            --text-main: #4a3e3d;
            --text-muted: #7d6b68;
            --accent: #d27974;
            --accent-hover: #b95d59;
            --border-color: #d3c7a8;
        }

        html.theme-dark {
            --bg-base: #1e1d2f;
            --bg-surface: #252438;
            --bg-sidebar: #191826;
            --text-main: #e0def4;
            --text-muted: #908caa;
            --accent: #ebbcba;
            --accent-hover: #e0afad;
            --border-color: #312f44;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .bg-surface { background-color: var(--bg-surface); }
        .bg-sidebar { background-color: var(--bg-sidebar); }
        .text-muted { color: var(--text-muted); }
        .accent-color { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .bg-accent:hover { background-color: var(--accent-hover); }
        .border-theme { border-color: var(--border-color); }

        /* Custom Scrollbars for Lofi vibe */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <header class="h-14 px-4 flex items-center justify-between border-b border-theme bg-surface z-10">
        <div class="flex items-center space-x-3">
            <button id="toggle-nav" class="p-2 rounded bg-sidebar border border-theme active:scale-95 transition-transform" title="Toggle Navigation">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-md md:text-lg font-bold tracking-tight">Lofi Viewer</h1>
        </div>

        <div class="flex items-center space-x-2">
            <button id="theme-toggle" class="p-2 rounded bg-sidebar border border-theme text-sm">
                🌓 Style
            </button>
            <label class="px-3 py-1.5 rounded bg-accent text-xs md:text-sm font-semibold text-stone-900 cursor-pointer shadow-sm hover:opacity-90 active:scale-95 transition-transform">
                Load Zip
                <input type="file" id="zip-file-input" accept=".zip" class="hidden">
            </label>
        </div>
    </header>

    <div class="flex-1 flex relative overflow-hidden">
        
        <aside id="sidebar" class="absolute inset-y-0 left-0 w-80 bg-sidebar border-r border-theme z-20 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
            <div class="p-3 border-b border-theme space-y-2">
                <input type="text" id="search-input" placeholder="Search files..." class="w-full px-3 py-1.5 text-sm rounded bg-surface border border-theme focus:outline-none focus:ring-1 focus:ring-[var(--accent)]">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-muted">Sort:</span>
                    <select id="sort-select" class="bg-surface border border-theme rounded px-1.5 py-0.5 focus:outline-none">
                        <option value="asc">Name (A-Z)</option>
                        <option value="desc">Name (Z-A)</option>
                    </select>
                </div>
            </div>

            <div id="file-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <div class="text-center py-8 text-sm text-muted">No zip loaded. Upload a zip to start.</div>
            </div>
        </aside>

        <div id="sidebar-overlay" class="absolute inset-0 bg-black/40 z-10 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col bg-stone-100 relative">
            <iframe id="viewer-frame" class="w-full h-full border-none bg-white hidden" sandbox="allow-scripts allow-same-origin"></iframe>
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                <div class="text-5xl mb-4">🍵</div>
                <h2 class="text-xl font-semibold mb-1">Your bookshelf is empty</h2>
                <p class="text-sm text-muted max-w-xs">Upload a zip archive containing monolith-bundled HTML files to begin reading.</p>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const zipInput = document.getElementById('zip-file-input');
        const fileListContainer = document.getElementById('file-list');
        const viewerFrame = document.getElementById('viewer-frame');
        const emptyState = document.getElementById('empty-state');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const toggleNavBtn = document.getElementById('toggle-nav');
        const searchInput = document.getElementById('search-input');
        const sortSelect = document.getElementById('sort-select');
        const themeToggleBtn = document.getElementById('theme-toggle');

        // State Variables
        let zipData = null; 
        let filesMap = {}; // path -> File entry
        let sortedFilePaths = [];
        let activePath = null;
        let currentBlobUrl = null;

        // Initialize App
        async function init() {
            // Setup Theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.className = `theme-${savedTheme}`;
            }

            // Restore Zip from IndexedDB
            try {
                const savedZipBlob = await localforage.getItem('cached_zip');
                if (savedZipBlob) {
                    await processZipFile(savedZipBlob);
                }
            } catch (err) {
                console.error("Failed to load cached zip from IndexedDB", err);
            }
        }

        // Toggle Theme
        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('theme-dark') || 
                           (!document.documentElement.classList.contains('theme-light') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            const nextTheme = isDark ? 'light' : 'dark';
            document.documentElement.className = `theme-${nextTheme}`;
            localStorage.setItem('theme', nextTheme);
        });

        // Toggle Sidebar
        function toggleSidebar() {
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            } else {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
            }
        }
        toggleNavBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // File Selection/Upload
        zipInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Cache file in IndexedDB for fast reloads
            try {
                await localforage.setItem('cached_zip', file);
            } catch (err) {
                console.warn("Storage quota exceeded. IndexedDB caching skipped.", err);
            }

            await processZipFile(file);
        });

        // Parse ZIP Contents
        async function processZipFile(file) {
            try {
                const zip = await JSZip.loadAsync(file);
                filesMap = {};
                sortedFilePaths = [];

                zip.forEach((relativePath, zipEntry) => {
                    if (!zipEntry.dir && relativePath.toLowerCase().endsWith('.html')) {
                        filesMap[relativePath] = zipEntry;
                        sortedFilePaths.push(relativePath);
                    }
                });

                renderFileList();

                // Restore last viewed file if it exists in the new/cached zip
                const lastPath = localStorage.getItem('last_active_path');
                if (lastPath && filesMap[lastPath]) {
                    await selectFile(lastPath, true);
                } else if (sortedFilePaths.length > 0) {
                    await selectFile(sortedFilePaths[0]);
                }

            } catch (err) {
                alert("Error loading ZIP file: " + err.message);
                console.error(err);
            }
        }

        // Render File List with sorting/filtering
        function renderFileList() {
            const query = searchInput.value.toLowerCase();
            const sortOrder = sortSelect.value;

            let filtered = sortedFilePaths.filter(path => {
                const filename = path.split('/').pop();
                return filename.toLowerCase().includes(query);
            });

            filtered.sort((a, b) => {
                const nameA = a.split('/').pop().toLowerCase();
                const nameB = b.split('/').pop().toLowerCase();
                return sortOrder === 'asc' ? nameA.localeCompare(nameB) : nameB.localeCompare(nameA);
            });

            if (filtered.length === 0) {
                fileListContainer.innerHTML = `<div class="text-center py-8 text-sm text-muted">No matching HTML files.</div>`;
                return;
            }

            fileListContainer.innerHTML = '';
            filtered.forEach(path => {
                const filename = path.split('/').pop();
                const folderPath = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';

                const button = document.createElement('button');
                button.className = `w-full text-left p-3 rounded-lg border transition-all text-sm flex flex-col gap-1 ${
                    activePath === path 
                        ? 'bg-accent text-stone-900 font-semibold border-transparent shadow-sm' 
                        : 'bg-surface border-theme hover:opacity-90'
                }`;

                button.innerHTML = `
                    <span class="truncate w-full">${filename}</span>
                    ${folderPath ? `<span class="text-[10px] opacity-70 truncate w-full">${folderPath}</span>` : ''}
                `;

                button.addEventListener('click', () => {
                    selectFile(path);
                    // On small screens/tablets, collapse sidebar automatically on file select
                    if (window.innerWidth < 768) {
                        toggleSidebar();
                    }
                });

                fileListContainer.appendChild(button);
            });
        }

        // Select and render a file
        async function selectFile(path, restoreScroll = false) {
            activePath = path;
            localStorage.setItem('last_active_path', path);

            // Update Active Class on Sidebar items
            renderFileList();

            const entry = filesMap[path];
            if (!entry) return;

            // Revoke prior URL to prevent memory leaks
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
            }

            const content = await entry.async('blob');
            currentBlobUrl = URL.createObjectURL(new Blob([content], { type: 'text/html' }));

            emptyState.classList.add('hidden');
            viewerFrame.classList.remove('hidden');
            viewerFrame.src = currentBlobUrl;

            // Restore Scroll Position Hook
            viewerFrame.onload = () => {
                const frameWindow = viewerFrame.contentWindow;
                const frameDoc = viewerFrame.contentDocument || frameWindow.document;

                if (restoreScroll) {
                    const savedScroll = localStorage.getItem(`scroll_${path}`);
                    if (savedScroll) {
                        frameWindow.scrollTo(0, parseFloat(savedScroll));
                    }
                }

                // Attach scroll tracker inside iframe
                frameWindow.addEventListener('scroll', () => {
                    localStorage.setItem(`scroll_${path}`, frameWindow.scrollY);
                });
            };
        }

        // Event Listeners for Search & Sorting
        searchInput.addEventListener('input', renderFileList);
        sortSelect.addEventListener('change', renderFileList);

        // Run On Start
        init();
    </script>
</body>
</html>
